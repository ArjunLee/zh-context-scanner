# zh-context-scanner Configuration for VaultSave Project
#
# This file defines scan targets for the VaultSave project.
# Copy and modify for your own project structure.
#
# Usage:
#   cd VaultSave/tools/zh-context-scanner
#   uv run python -m src.main --config VaultSave_Config.yaml
#
# Or from any directory with --root:
#   uv run python -m src.main --config VaultSave_Config.yaml --root /path/to/VaultSave

# Project name (displayed in logs and TUI)
project_name: "VaultSave"

# Scan target configuration
# Each target defines:
#   - path: Directory or file path (relative to project root)
#   - extensions: File extensions to scan
#   - exclude_subdirs: Subdirectories to skip within this target
scan_targets:
# React/TypeScript frontend
- path: "apps/desktop/ui"
  extensions:
  - ".tsx"
  - ".ts"
  - ".jsx"
  - ".js"
  - ".css"
  exclude_subdirs:
  - "locales" # Translation files (already localized)
  - "DebugPage" # Debug page components
  - "dist" # Build output
  - "node_modules" # Dependencies

# Rust/Tauri backend
- path: "apps/desktop/src-tauri/src"
  extensions:
  - ".rs"
  exclude_subdirs:
  - "target" # Build output
  - "gen" # Generated schemas

# Pipeline scripts
- path: "scripts/pipeline"
  extensions:
  - ".py"
  exclude_subdirs:
  - "__pycache__"

# CI pipeline script (single file)
- path: "ci_pipeline.py"
  extensions:
  - ".py"
  exclude_subdirs: []

# Shared configuration
- path: "shared"
  extensions:
  - ".toml"
  exclude_subdirs: []

# App meta sync script (single file)
- path: "sync_app_meta.py"
  extensions:
  - ".py"
  exclude_subdirs: []

# Global exclude directories
# Applied to all scan targets universally
global_excludes:
- "dist" # Build outputs
- "node_modules" # JS dependencies
- "target" # Rust build output
- "gen" # Generated files
- ".git" # Git repository
- "__pycache__" # Python cache
- ".venv" # Python virtual environment
- "VaultSave_Gatway/.venv" # Gateway virtual environment
