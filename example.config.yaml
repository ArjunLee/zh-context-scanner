# zh-context-scanner Project Configuration Example
#
# Usage:
# 1. Copy this file and modify for your project
# 2. Run: uv run python -m src.main --config my_project.yaml
# 3. Or with scan mode: uv run python -m src.main --scan --config my_project.yaml

# Project name (optional, for display in logs)
project_name: "My Awesome Project"

# Scan target configuration
scan_targets:
# TypeScript/React project
- path: "src"
  extensions:
  - ".ts"
  - ".tsx"
  - ".js"
  - ".jsx"
  exclude_subdirs:
  - "node_modules"
  - "dist"
  - "__tests__"
  - ".test"

# Python backend
- path: "backend"
  extensions:
  - ".py"
  exclude_subdirs:
  - "__pycache__"
  - ".venv"
  - "venv"
  - ".pytest_cache"

# Rust/Tauri project
- path: "src-tauri/src"
  extensions:
  - ".rs"
  exclude_subdirs:
  - "target"
  - "gen"

# CSS/Style files
- path: "src/styles"
  extensions:
  - ".css"
  - ".scss"
  - ".less"
  exclude_subdirs: []

# Global exclude directories (optional)
# Defaults include: node_modules, dist, .git, .venv, __pycache__, target
global_excludes:
- ".next" # Next.js
- ".nuxt" # Nuxt.js
- "build" # Python build
- "coverage" # Test coverage
- ".idea" # IDE files
- ".vscode" # VS Code settings
